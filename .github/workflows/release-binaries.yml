name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Build Windows executable
        shell: pwsh
        run: |
          $env:PYTHON_BIN = (Get-Command python).Source
          ./scripts/build_windows.ps1

      - name: Prepare Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item dist/windows/SerialMonitor.exe release/SerialMonitor-windows.exe -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialMonitor-windows
          path: release/SerialMonitor-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Build Linux executable
        run: |
          export PYTHON_BIN="$(command -v python)"
          bash ./scripts/build_linux.sh

      - name: Prepare Linux release asset
        run: |
          mkdir -p release
          cp -f dist/linux/SerialMonitor release/SerialMonitor-linux
          chmod +x release/SerialMonitor-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialMonitor-linux
          path: release/SerialMonitor-linux

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact folders
        run: |
          find release -type f -name "SerialMonitor-*" -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum SerialMonitor-windows.exe SerialMonitor-linux > SHA256SUMS.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SerialMonitor-windows.exe
            release/SerialMonitor-linux
            release/SHA256SUMS.txt